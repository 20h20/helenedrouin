on: 
  push:
    branches: 
      - main
name: Deploy theme to prod
jobs:
  FTP-Deploy-Action:
    name: FTP-Deploy-Action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master
      - name: Set up Node.js
        uses: actions/setup-node@master
        with:
          node-version: '12.x'
      - run: npm install --legacy-peer-deps
      - run: npm run build
      - name: RSync-Deploy-Action
        id: deploy_staging
        uses: Pendect/action-rsyncer@v1.1.0
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY_PROD }}
        with: 
          flags: '-avzr --delete --timeout=60 --partial -e "ssh -o ServerAliveInterval=30"'
          options: '--exclude "src" --exclude ".git" --exclude "README.md" --exclude "package.json" --exclude "package-lock.json" --exclude "Gruntfile.js" --exclude "yarn.lock" --exclude ".github" --exclude "node_modules" --exclude ".gitignore"'
          src: '.'
          dest: 'djvjxpk@ftp.cluster029.hosting.ovh.net:/home/djvjxpk/www/wp-content/themes/helenedrouin'
      - name: Display status from deploy
        run: echo "${{ steps.deploy_staging.outputs.status }}"
